modLoader = "javafml"
loaderVersion = "*"
license = "MIT"
issueTrackerURL = "https://www.curseforge.com/minecraft/mc-mods/ftb-quests-entity-visualization"

[[mods]]
modId = "${id}"
version = "${version}"
displayName = "${name}"
displayURL = "https://www.curseforge.com/minecraft/mc-mods/ftb-quests-entity-visualization"
authors = "Sxilverr"
description = "Adds entity visualization to FTB Quests."
logoFile = "assets/${id}/icon.png"

[[mixins]]
config = "ftbquestsentityvis.mixins.json"

[[dependencies.${id}]]
modId = "forge"
mandatory = true
versionRange = "*"
ordering = "NONE"
side = "BOTH"

[[dependencies.${id}]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${id}]]
modId = "ftbquests"
mandatory = true
versionRange = "[2001.4,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${id}]]
modId = "ftblibrary"
mandatory = true
versionRange = "[2001.2,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${id}]]
modId = "questsadditions"
mandatory = false
versionRange = "*"
ordering = "AFTER"
side = "BOTH"
